# Deploy — gestiona infra (Terraform) + imágenes (ECR) + rollout (ECS).
name: Deploy to AWS

on:
  #push:
    #branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_WORKING_DIR: terraform/option-b-ecs  
  TF_STATE_KEY: gimnasio/terraform.tfstate
  TF_LOCK_TABLE: gimnasio-tflock

jobs:
  deploy:
    name: Provision & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Bootstrap Terraform backend
        run: |
          set -euo pipefail
          REGION="${{ vars.AWS_REGION }}"
          BUCKET="${{ vars.TF_STATE_BUCKET }}"
          TABLE="${TF_LOCK_TABLE}"

          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "→ Creando bucket $BUCKET"
            if [[ "$REGION" == "us-east-1" ]]; then
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
            else
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" \
                --create-bucket-configuration LocationConstraint="$REGION"
            fi
            aws s3api put-bucket-versioning --bucket "$BUCKET" --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$BUCKET" --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block --bucket "$BUCKET" --public-access-block-configuration 'BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true'
          else
            echo "✔ Bucket $BUCKET ya existe"
          fi

          if ! aws dynamodb describe-table --table-name "$TABLE" --region "$REGION" >/dev/null 2>&1; then
            echo "→ Creando tabla DynamoDB $TABLE"
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$REGION" >/dev/null
            aws dynamodb wait table-exists --table-name "$TABLE" --region "$REGION"
          else
            echo "✔ Tabla $TABLE ya existe"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform apply (ECR repos)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve -input=false \
            -target=aws_ecr_repository.members \
            -target=aws_ecr_repository.billing \
            -target=aws_ecr_repository.access_control \
            -var="db_password=${{ secrets.DB_PASSWORD }}" 

      - name: Get ECR repository URLs
        id: ecr
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "members=$(terraform output -raw ecr_members_repository_url)" >> "$GITHUB_OUTPUT"
          echo "billing=$(terraform output -raw ecr_billing_repository_url)" >> "$GITHUB_OUTPUT"
          echo "access_control=$(terraform output -raw ecr_access_control_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- CONSTRUCCIÓN DE IMÁGENES DOCKER ---
      - name: Build & push members
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/members/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.members }}:${{ github.sha }}
            ${{ steps.ecr.outputs.members }}:latest
          cache-from: type=gha,scope=members
          cache-to: type=gha,mode=max,scope=members

      - name: Build & push billing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/billing/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.billing }}:${{ github.sha }}
            ${{ steps.ecr.outputs.billing }}:latest
          cache-from: type=gha,scope=billing
          cache-to: type=gha,mode=max,scope=billing

      - name: Build & push access-control
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/access-control/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.access_control }}:${{ github.sha }}
            ${{ steps.ecr.outputs.access_control }}:latest
          cache-from: type=gha,scope=access_control
          cache-to: type=gha,mode=max,scope=access_control

      - name: Terraform apply (infra completa)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve -input=false \
            -var="image_tag=${{ github.sha }}" \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}"

      - name: Wait for ECS services to stabilize
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          CLUSTER=$(terraform output -raw cluster_name)
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services members billing access-control \
            --region "${{ vars.AWS_REGION }}"

      - name: Summary
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          ALB=$(terraform output -raw alb_dns_name)
          {
            echo "## Deploy completado"
            echo ""
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **URL:** http://$ALB"
          } >> "$GITHUB_STEP_SUMMARY"