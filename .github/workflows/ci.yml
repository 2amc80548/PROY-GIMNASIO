# CI — corre en cada PR y push a main.
# Verifica que el código compila, pasa lint y tests antes de mergear.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Lint, build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      # --- CONSTRUCCIÓN DEL GIMNASIO ---
      - name: Build members
        run: npm run build:members

      - name: Build billing
        run: npm run build:billing

      - name: Build access-control
        run: npm run build:access-control

      - name: Test
        run: npm test -- --passWithNoTests